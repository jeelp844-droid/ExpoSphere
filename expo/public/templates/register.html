{% extends 'base.html' %}
{% load static %}
{% block contact %}

<style>
@media (max-width: 600px) {
    .register-section {
        padding: 20px 0 40px !important;
        align-items: flex-start !important;
    }
    .register-wrapper {
        border-radius: 0 !important;
        box-shadow: none !important;
        padding: 28px 20px 36px !important;
        min-height: 100svh;
    }
    .register-title { font-size: 24px !important; }
    .register-subtitle { margin-bottom: 20px !important; }
    .role-card { padding: 16px 8px !important; }
    .role-card .material-symbols-outlined { font-size: 28px !important; }
    .field-mb { margin-bottom: 14px !important; }
    .input-field { padding: 11px 12px !important; font-size: 15px !important; }
    .submit-btn { padding: 13px !important; font-size: 15px !important; border-radius: 10px !important; }
    .google-btn { padding: 12px !important; border-radius: 12px !important; }
    .divider-text { font-size: 10px !important; }
}
</style>

<section class="register-section min-h-screen bg-gray-100 py-20 flex items-center justify-center">

  <div class="register-wrapper w-full max-w-md mx-auto bg-white rounded-2xl shadow-lg px-10 py-10">

    <h2 class="register-title text-3xl font-bold text-center text-gray-900 mb-1">Create Account</h2>
    <p class="register-subtitle text-center text-gray-500 mb-7 text-sm">Join the exhibition platform</p>

    <form method="POST">
      {% csrf_token %}

      <!-- Full Name -->
      <div class="field-mb mb-4">
        <label class="block font-semibold text-gray-700 mb-1.5 text-sm">Full Name</label>
        <input type="text" name="full_name"
          class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition"
          placeholder="John Doe" required>
      </div>

      <!-- Email -->
      <div class="field-mb mb-4">
        <label class="block font-semibold text-gray-700 mb-1.5 text-sm">Email</label>
        <input type="email" name="email"
          class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition"
          placeholder="john@email.com" required>
      </div>

      <!-- Mobile -->
      <div class="field-mb mb-4">
        <label class="block font-semibold text-gray-700 mb-1.5 text-sm">Mobile Number</label>
        <input type="text" name="mobile"
          class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition"
          placeholder="9876543210" required>
      </div>

      <!-- Username -->
      <div class="field-mb mb-4">
        <label class="block font-semibold text-gray-700 mb-1.5 text-sm">Username</label>
        <input type="text" name="username"
          class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition"
          placeholder="john123" required>
      </div>

      <!-- Password -->
      <div class="field-mb mb-4">
        <label class="block font-semibold text-gray-700 mb-1.5 text-sm">Password</label>
        <input type="password" name="password"
          class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition"
          placeholder="••••••" required>
      </div>

      <!-- Confirm Password -->
      <div class="field-mb mb-5">
        <label class="block font-semibold text-gray-700 mb-1.5 text-sm">Confirm Password</label>
        <input type="password" name="confirm_password"
          class="input-field w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100 transition"
          placeholder="••••••" required>
      </div>

      <!-- Role Selection -->
      <div class="mb-6">
        <label class="block font-semibold text-gray-700 mb-2 text-sm">I am joining as a:</label>
        <div class="grid grid-cols-2 gap-4">

          <!-- Visitor -->
          <div id="visitor-card" onclick="selectRole('Visitor')"
            class="role-card active flex flex-col items-center justify-center p-6 border-2 border-blue-600 bg-blue-50 rounded-xl cursor-pointer transition-all duration-200">
            <span class="material-symbols-outlined text-4xl mb-2 text-blue-600">person</span>
            <span class="font-bold text-gray-800 text-sm">Visitor</span>
          </div>

          <!-- Organizer -->
          <div id="organizer-card" onclick="selectRole('Organizer')"
            class="role-card flex flex-col items-center justify-center p-6 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-blue-300 transition-all duration-200">
            <span class="material-symbols-outlined text-4xl mb-2 text-gray-400">chair</span>
            <span class="font-bold text-gray-800 text-sm">Organizer</span>
          </div>

        </div>
        <input type="hidden" name="role" id="role-input" value="Visitor">
      </div>

      <!-- Declaration -->
      <div class="flex items-start gap-2 mb-5">
        <input type="checkbox"
          class="mt-0.5 w-4 h-4 accent-blue-600 cursor-pointer"
          required>
        <label class="text-sm text-gray-600">
          I declare that the information provided is true and correct.
        </label>
      </div>

      {% load static socialaccount %}

      <!-- Register Button -->
      <button type="submit"
        class="submit-btn w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold py-3 rounded-lg text-base transition-colors duration-200">
        Register
      </button>

      <!-- Divider -->
      <div class="flex items-center my-6">
        <div class="flex-grow border-t border-gray-200"></div>
        <span class="divider-text px-4 text-gray-400 text-xs font-semibold uppercase tracking-widest">or sign up with</span>
        <div class="flex-grow border-t border-gray-200"></div>
      </div>

      <!-- Google Sign Up -->
      <div class="mb-6">
        <a href="javascript:void(0)" onclick="selectRoleAndLogin(event)"
          class="google-btn flex w-full items-center justify-center gap-3 py-3 border border-gray-200 rounded-xl hover:bg-gray-50 hover:shadow-sm transition-all duration-200 group">
          <svg class="w-5 h-5 group-hover:rotate-12 transition-transform" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span class="font-bold text-gray-700 text-sm">Register with Google</span>
        </a>
      </div>

      <!-- Login Link -->
      <p class="text-center text-gray-500 text-sm">
        Already have an account?
        <a href="/login/" class="text-blue-600 font-bold hover:underline">Login here</a>
      </p>

    </form>
  </div>

</section>

<script>
  function selectRoleAndLogin(event) {
    event.preventDefault();
    const role = document.getElementById('role-input').value;
    
    fetch(`/set-social-role/?role=${role}`)
      .then(response => response.json())
      .then(data => {
        window.location.href = "{% provider_login_url 'google' %}";
      })
      .catch(error => {
        console.error('Error setting social role:', error);
        window.location.href = "{% provider_login_url 'google' %}";
      });
  }

  function selectRole(role) {
    document.getElementById('role-input').value = role;

    const visitorCard = document.getElementById('visitor-card');
    const organizerCard = document.getElementById('organizer-card');

    const activeClasses = ['border-blue-600', 'bg-blue-50'];
    const inactiveClasses = ['border-gray-200'];
    const activeIcon = 'text-blue-600';
    const inactiveIcon = 'text-gray-400';

    if (role === 'Visitor') {
      visitorCard.classList.add(...activeClasses);
      visitorCard.classList.remove(...inactiveClasses);
      visitorCard.querySelector('span.material-symbols-outlined').classList.replace(inactiveIcon, activeIcon);

      organizerCard.classList.remove(...activeClasses);
      organizerCard.classList.add(...inactiveClasses);
      organizerCard.querySelector('span.material-symbols-outlined').classList.replace(activeIcon, inactiveIcon);
    } else {
      organizerCard.classList.add(...activeClasses);
      organizerCard.classList.remove(...inactiveClasses);
      organizerCard.querySelector('span.material-symbols-outlined').classList.replace(inactiveIcon, activeIcon);

      visitorCard.classList.remove(...activeClasses);
      visitorCard.classList.add(...inactiveClasses);
      visitorCard.querySelector('span.material-symbols-outlined').classList.replace(activeIcon, inactiveIcon);
    }
  }
</script>

{% endblock %}
