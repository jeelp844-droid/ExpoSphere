{% extends 'base.html' %}
{% load static socialaccount %}
{% block contact %}

<section class="min-h-screen bg-gray-50 flex flex-col items-center justify-center py-8 sm:py-12 px-4 sm:px-8">

  <div class="w-full max-w-sm sm:max-w-md space-y-6">

    <!-- Header -->
    <div class="text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 sm:w-20 sm:h-20 rounded-2xl sm:rounded-3xl bg-blue-50 mb-6 shadow-sm border border-blue-100/50">
        <span class="material-symbols-outlined text-blue-600 text-4xl sm:text-5xl">person</span>
      </div>
      <h2 class="text-2xl sm:text-3xl font-black text-slate-900 tracking-tight">Welcome Back</h2>
      <p class="mt-2 text-slate-500 text-sm leading-relaxed">Enter your credentials to access your ExpoSphere workspace.</p>
    </div>

    <!-- Card wrapper -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 px-6 py-8 sm:px-8">

      <!-- Form -->
      <form class="space-y-5" method="POST">
        {% csrf_token %}

        <div class="space-y-4">

          <!-- Email / Username -->
          <div>
            <label for="username" class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">
              Email Address / Username
            </label>
            <div class="relative flex items-center rounded-xl border border-slate-200 bg-white focus-within:border-blue-600 focus-within:ring-2 focus-within:ring-blue-100 transition-all duration-200">
              <div class="absolute left-0 pl-3.5 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-slate-400 text-lg">mail</span>
              </div>
              <input id="username" name="username" type="text" required
                class="block w-full pl-10 pr-3 py-3.5 border-none bg-transparent text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-0 text-sm rounded-xl"
                placeholder="name@company.com">
            </div>
          </div>

          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label for="password" class="block text-xs font-semibold text-slate-600 uppercase tracking-wide">Password</label>
              <a href="{% url 'forgot_password' %}"
                class="text-xs font-bold text-blue-600 hover:text-blue-700 transition-colors">
                Forgot password?
              </a>
            </div>
            <div class="relative flex items-center rounded-xl border border-slate-200 bg-white focus-within:border-blue-600 focus-within:ring-2 focus-within:ring-blue-100 transition-all duration-200">
              <div class="absolute left-0 pl-3.5 flex items-center pointer-events-none">
                <span class="material-symbols-outlined text-slate-400 text-lg">lock</span>
              </div>
              <input id="password" name="password" type="password" required
                class="block w-full pl-10 pr-11 py-3.5 border-none bg-transparent text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-0 text-sm tracking-widest rounded-xl"
                placeholder="••••••••">
              <button type="button"
                class="absolute right-0 pr-3.5 flex items-center focus:outline-none min-w-[44px] min-h-[44px] justify-end"
                onclick="togglePassword(this)">
                <span class="material-symbols-outlined text-slate-400 hover:text-slate-600 transition-colors text-lg">visibility</span>
              </button>
            </div>
          </div>

        </div>

        <!-- Remember Me -->
        <div class="flex items-center">
          <input id="remember_me" name="remember_me" type="checkbox" value="true"
            class="h-4 w-4 accent-blue-600 border-slate-300 rounded cursor-pointer">
          <label for="remember_me" class="ml-2 block text-sm text-slate-600 cursor-pointer select-none">
            Keep me logged in
          </label>
        </div>

        <!-- Sign In Button -->
        <div class="pt-1">
          <button type="submit"
            class="group w-full flex justify-center items-center py-3.5 px-4 text-sm font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 active:bg-blue-800 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-md shadow-blue-500/30 transition-all duration-200">
            Sign In
            <span class="material-symbols-outlined ml-2 text-lg transition-transform group-hover:translate-x-1">arrow_forward</span>
          </button>
        </div>

        <!-- Divider -->
        <div class="relative py-1">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-slate-200"></div>
          </div>
          <div class="relative flex justify-center text-xs uppercase">
            <span class="bg-white px-4 text-slate-400 font-semibold tracking-wider">or continue with</span>
          </div>
        </div>

        <!-- Google Button -->
        <div>
          <a href="{% provider_login_url 'google' %}"
            class="w-full flex items-center justify-center gap-3 py-3.5 px-4 border border-slate-200 rounded-xl bg-white text-sm font-bold text-slate-700 hover:bg-slate-50 hover:border-slate-300 hover:shadow-md active:scale-[0.98] transition-all duration-200 group">
            <svg class="w-5 h-5 flex-shrink-0 group-hover:scale-110 transition-transform duration-200" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Log in with Google
          </a>
        </div>

      </form>
    </div>

  </div>
</section>

<script>
  function togglePassword(button) {
    const passwordInput = document.getElementById('password');
    const icon = button.querySelector('.material-symbols-outlined');
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      icon.textContent = 'visibility_off';
    } else {
      passwordInput.type = 'password';
      icon.textContent = 'visibility';
    }
  }
</script>

{% endblock %}
