{% extends 'base.html' %}
{% load static %}
{% block contact %}

<style>
body { background: #f3f4f6; }

.register-card {
    max-width: 480px;
    margin: auto;
    background: #fff;
    padding: 40px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}
.register-title { font-size: 30px; font-weight: 700; text-align: center; margin-bottom: 5px; }
.register-subtitle { text-align: center; color: #6b7280; margin-bottom: 25px; }
.form-control { width: 100%; padding: 12px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; transition: 0.2s; box-sizing: border-box; }
.form-control:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 2px rgba(37,99,235,0.1); }
.form-label { font-weight: 600; margin-bottom: 6px; display: block; }
.register-btn { width: 100%; background: #2563eb; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; transition: 0.3s; cursor: pointer; }
.register-btn:hover { background: #1d4ed8; }

/* ── Mobile ── */
@media (max-width: 600px) {
    .page-section { padding: 24px 0 40px; }

    .register-card {
        max-width: 100%;
        margin: 0 16px;
        padding: 28px 20px;
        border-radius: 16px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    }

    .register-title { font-size: 22px; }
    .register-subtitle { font-size: 13px; margin-bottom: 20px; }
    .form-label { font-size: 13px; }
    .form-control { padding: 11px 12px; font-size: 15px; }
    .register-btn { padding: 13px; font-size: 15px; border-radius: 10px; }
}
</style>

<section class="page-section py-20">
<div class="register-card">

<h2 class="register-title">Forgot Password</h2>
<p class="register-subtitle">Enter your email or username to reset</p>

<form method="POST">
{% csrf_token %}

<div class="mb-4">
<label class="form-label">Email or Username</label>
<input type="text" name="email_or_username" class="form-control" placeholder="Enter email or username" required>
</div>

<button type="submit" class="register-btn">
Reset Password
</button>

<p class="mt-4 text-center">
<a href="/login/" class="text-primary text-decoration-none font-semibold hover:underline" style="color: #2563eb;">
Back to Login
</a>
</p>
</form>
</div>
</section>
{% endblock %}
