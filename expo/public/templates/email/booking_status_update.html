<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; line-height: 1.6; color: #334155; margin: 0; padding: 0; background-color: #f8fafc; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
        .header { background-color: #64748b; padding: 40px 20px; text-align: center; color: #ffffff; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; }
        .content { padding: 40px 30px; }
        .content h2 { color: #0f172a; margin-top: 0; font-size: 20px; font-weight: 700; }
        .footer { padding: 30px; text-align: center; font-size: 12px; color: #64748b; border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>EXPOSPHERE</h1>
        </div>
        <div class="content">
            <h2>Booking Status Update</h2>
            <p>Hi {{ user_name }},</p>
            <p>The status of your booking for <strong>{{ ex_title }}</strong> has been updated to: <strong>{{ status|title }}</strong>.</p>
            
            <p>Log in to your dashboard to see full details.</p>
        </div>
        <div class="footer">
            <p>&copy; 2026 ExpoSphere. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
