{% extends 'base_dashboard.html' %}

{% block content %}

<!-- Page Header -->
<div class="max-w-3xl mx-auto mb-6 md:mb-8 text-center">
    <h1 class="text-2xl md:text-3xl font-black text-slate-900 dark:text-white">Add New Exhibition</h1>
    <p class="text-slate-500 text-sm mt-1">Fill in the details below to create a new exhibition listing.</p>
</div>

<div class="max-w-3xl mx-auto bg-white dark:bg-slate-900 p-5 md:p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
    <form method="POST" enctype="multipart/form-data" class="space-y-5">
        {% csrf_token %}

        <!-- Exhibition Title -->
        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Exhibition Title</label>
            <input type="text" name="title" required
                   class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
        </div>

        <!-- Image Upload -->
        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Exhibition Image</label>
            <input type="file" name="image" id="imageInput" accept="image/*"
                   class="w-full px-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm text-slate-500 file:mr-4 file:py-1.5 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-primary file:text-white hover:file:bg-primary/90 transition-all cursor-pointer">
            <div id="imagePreview" class="mt-2 w-full h-44 md:h-52 rounded-xl border border-dashed border-slate-200 dark:border-slate-700 flex items-center justify-center overflow-hidden bg-slate-50 dark:bg-slate-800/50 text-slate-400 text-sm">
                <div class="flex flex-col items-center gap-2">
                    <span class="material-symbols-outlined text-3xl text-slate-300">image</span>
                    <span class="text-xs text-slate-400">Image Preview</span>
                </div>
            </div>
        </div>

        <!-- Description -->
        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Description</label>
            <textarea name="description" rows="4"
                      class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all resize-none"></textarea>
        </div>

        <!-- Category -->
        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Category</label>
            <select name="category" required
                    class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
                <option value="">Select Category</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- Venue -->
        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Venue</label>
            <input type="text" name="venue"
                   class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
        </div>

        <!-- Country & City -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Country</label>
                <select name="country" id="country" required
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
                    <option value="">Select Country</option>
                    {% for country in countries %}
                        <option value="{{ country.id }}">{{ country.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">City</label>
                <select name="city" id="city" required
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
                    <option value="">Select City</option>
                </select>
            </div>
        </div>

        <!-- Start & End Date -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Start Date</label>
                <input type="date" name="start_date"
                       class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">End Date</label>
                <input type="date" name="end_date"
                       class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            </div>
        </div>

        <!-- Start & End Time -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Start Time</label>
                <input type="time" name="start_time"
                       class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">End Time</label>
                <input type="time" name="end_time"
                       class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            </div>
        </div>

        <!-- Ticket & Stall Price -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Ticket Price (₹)</label>
                <input type="number" name="ticket_price"
                       class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Stall Price (₹)</label>
                <input type="number" name="stall_price"
                       class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            </div>
        </div>

        <!-- Total Stalls & Tickets -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Stalls</label>
                <input type="number" name="total_stalls"
                       class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Tickets</label>
                <input type="number" name="total_tickets" placeholder="e.g. 500"
                       class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-primary/20 outline-none transition-all">
            </div>
        </div>

        <button type="submit"
                class="w-full mt-2 py-3.5 bg-slate-900 dark:bg-primary text-white font-bold rounded-2xl hover:opacity-90 transition-opacity shadow-lg flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-xl">add_circle</span>
            Add Exhibition
        </button>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
/* IMAGE PREVIEW */
$("#imageInput").change(function(){
    const file = this.files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            $("#imagePreview").html('<img src="'+e.target.result+'" class="w-full h-full object-cover">');
        }
        reader.readAsDataURL(file);
    }
});

/* COUNTRY CITY AJAX */
$("#country").change(function(){
    var countryId = $(this).val();
    $.ajax({
        url: "{% url 'load_cities' %}",
        data:{ 'country': countryId },
        success:function(data){
            $("#city").html('<option value="">Select City</option>');
            data.forEach(function(city){
                $("#city").append('<option value="'+city.id+'">'+city.name+'</option>');
            });
        }
    });
});
</script>

{% endblock %}
