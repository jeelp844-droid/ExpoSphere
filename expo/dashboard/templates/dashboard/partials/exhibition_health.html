{% for ex in exhibition_health %}
<div class="glass-card mesh-gradient-1 p-6 rounded-3xl animate-in flex flex-col justify-between" style="animation-delay: {{ forloop.counter|add:8 }}00ms;">
    <div class="flex justify-between items-start mb-4">
        <div>
            <h4 class="text-sm font-black text-slate-900 dark:text-white line-clamp-1 leading-tight">{{ ex.title }}</h4>
            <div class="flex items-center gap-2 mt-2">
                <span class="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-[9px] font-black rounded uppercase tracking-widest">
                    {{ ex.status }}
                </span>
                {% if ex.days_to_go is not None %}
                <span class="text-[10px] font-bold text-indigo-500 dark:text-indigo-400 tracking-tight">
                    {{ ex.days_to_go }} days left
                </span>
                {% endif %}
            </div>
        </div>
        <div class="text-right ml-4">
            <p class="text-[9px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">Revenue</p>
            <p class="text-sm font-black text-indigo-600 dark:text-indigo-400 mt-0.5">₹{{ ex.revenue|floatformat:0 }}</p>
        </div>
    </div>

    <div class="space-y-4 my-2">
        <!-- Occupancy Bar -->
        <div>
            <div class="flex justify-between text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">
                <span>Stall Occupancy</span>
                <span class="text-slate-800 dark:text-slate-200 font-black">{{ ex.occupancy_percent }}%</span>
            </div>
            <div class="h-1.5 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                <div class="h-full bg-indigo-500 rounded-full transition-all duration-1000" 
                     style="width: {{ ex.occupancy_percent }}%"></div>
            </div>
        </div>
    </div>
    
    <div class="mt-4 pt-4 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center group cursor-pointer" onclick="window.location.href='/dashboard/my-exhibition-book/{{ ex.id }}/'">
        <span class="text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-widest group-hover:underline">Manage Bookings</span>
        <span class="material-symbols-outlined text-indigo-300 dark:text-indigo-500 text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
    </div>
</div>
{% endfor %}
